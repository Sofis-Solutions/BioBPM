name: BioBPM Build

on:
  push:
    branches: [ "biobpm/main", "biobpm/**" ]
  pull_request:
    branches: [ "biobpm/main" ]

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Bootstrap BOMs
        run: |
          mvn install -N -q
          mvn install -f spin/bom/pom.xml -q
          mvn install -f commons/bom/pom.xml -q
          mvn install -f connect/bom/pom.xml -q
          mvn install -f engine-dmn/bom/pom.xml -q
          mvn install -f bom/camunda-only-bom/pom.xml -q
          mvn install -f bom/camunda-bom/pom.xml -q
          mvn install -f parent/pom.xml -N -q
          mvn install -f internal-dependencies/pom.xml -N -q

      - name: Build (skip tests)
        run: mvn install -DskipTests -q

      - name: Engine unit tests
        run: mvn test -pl engine -P check-engine

  engine-integration:
    name: Engine Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Bootstrap BOMs
        run: |
          mvn install -N -q
          mvn install -f spin/bom/pom.xml -q
          mvn install -f commons/bom/pom.xml -q
          mvn install -f connect/bom/pom.xml -q
          mvn install -f engine-dmn/bom/pom.xml -q
          mvn install -f bom/camunda-only-bom/pom.xml -q
          mvn install -f bom/camunda-bom/pom.xml -q
          mvn install -f parent/pom.xml -N -q
          mvn install -f internal-dependencies/pom.xml -N -q

      - name: Build (skip tests)
        run: mvn install -DskipTests -q

      - name: Integration tests (engine)
        run: mvn verify -pl qa/integration-tests-engine -P engine-integration -DskipTests=false
